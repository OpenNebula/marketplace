    ONEAPP_LDAP_ADMIN_USER: "O|text|LDAP admin user||"
    ONEAPP_LDAP_ADMIN_PASSWORD: "O|password|LDAP admin password||"
    ONEAPP_LDAP_URL: "O|text|External LDAP URL (used only when local LDAP is disabled)||"
    ONEAPP_LDAP_BIND_USER: "O|text|LDAP bind user (optional)||"
    ONEAPP_LDAP_BIND_PASSWORD: "O|password|LDAP bind password (optional)||"
